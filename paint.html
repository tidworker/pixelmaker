<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專業點陣圖編輯器</title>
    <style>
        @font-face {
            font-family: 'Bakudai-Regular';
            src: url(https://cdn.jsdelivr.net/gh/max32002/bakudaifont@1.48/webfont/Bakudai-Regular.woff2) format("woff2");
        }
        
        :root {
            --bg-dark: #0A0A0A;
            --surface: #1A1A1A;
            --surface-light: #2A2A2A;
            --surface-hover: #3A3A3A;
            --primary: #4A4A4A;
            --primary-active: #6A6A6A;
            --text-main: #FFFFFF;
            --text-muted: #999999;
            --border-color: #333333;
            --success: #6A9A6A;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
        }

        /* --- 頂部分段切換器 --- */
        .header {
            flex-shrink: 0;
            padding: calc(10px + env(safe-area-inset-top)) 15px 10px;
            background: var(--surface);
            z-index: 20;
            border-bottom: 1px solid var(--border-color);
        }
        .segmented-control {
            display: flex; background: var(--bg-dark);
            border: 1px solid var(--border-color);
        }
        .segment-btn {
            flex: 1; padding: 8px 0; text-align: center;
            color: var(--text-muted);
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: background 0.2s;
        }
        .segment-btn.active {
            background: var(--primary);
            color: var(--text-main);
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }
        .tab-content.active {
            display: flex;
        }

        /* --- 繪圖頁面 --- */
        .workspace-container {
            flex: 1;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        #workspace {
            position: relative;
            width: 96vw; height: 96vw;
            max-width: 600px; max-height: 600px;
            transform-origin: center center;
            background-color: #FFFFFF;
            border-radius: 0;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
        
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
            pointer-events: none;
        }
        #mainCanvas { z-index: 2; }
        #previewCanvas { z-index: 3; }
        #gridCanvas { z-index: 4; opacity: 0.15; transition: opacity 0.2s; }

        /* --- 底部工具列 --- */
        .bottom-panel {
            flex-shrink: 0;
            background: var(--surface);
            border-top: 1px solid var(--border-color);
            padding: 15px 0 calc(15px + env(safe-area-inset-bottom));
            z-index: 30;
            display: flex; flex-direction: column; gap: 12px;
        }

        .scroll-row {
            display: flex; overflow-x: auto;
            padding: 0 15px; gap: 10px;
            scrollbar-width: none; align-items: center;
        }
        .scroll-row::-webkit-scrollbar { display: none; }

        .color {
            flex: 0 0 36px; width: 36px; height: 36px;
            border-radius: 0;
            border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: white;
            transition: 0.1s ease;
            box-sizing: border-box;
        }
        .color.selected { 
            border: 3px solid #FFFFFF; 
            transform: scale(1.1); 
            z-index: 2;
        }

        .tool {
            flex: 0 0 auto;
            padding: 10px 18px;
            background: var(--surface-light); 
            color: var(--text-main);
            border-radius: 0;
            border: 1px solid var(--border-color);
            font-size: 14px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .tool:active { background: var(--surface-hover); }
        .tool.active-tool { background: var(--primary-active); border-color: #888; }
        .tool-action { background: var(--bg-dark); }
        .tool-save { background: #FFFFFF; color: #000000; }
        .tool.disabled-look { opacity: 0.4; background: var(--bg-dark); }

        /* --- 文字生成面板 --- */
        #textTab {
            background: var(--bg-dark);
            align-items: center; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .text-preview-wrapper {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100%;
        }

        .preview-container {
            width: 75vw; height: 75vw; max-width: 300px; max-height: 300px;
            background: #FFFFFF; border-radius: 0;
            margin-bottom: 15px; position: relative;
            cursor: grab; border: 1px solid var(--border-color);
        }
        .preview-container:active { cursor: grabbing; }
        #textPreviewCanvas { width: 100%; height: 100%; image-rendering: pixelated; pointer-events: auto; }

        .hint-text { font-size: 13px; color: var(--text-muted); text-align: center; }

        .form-group {
            background: var(--surface); width: 85%; max-width: 400px;
            border-radius: 0; padding: 20px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 0;
        }
        .form-row { display: flex; justify-content: space-between; align-items: center; }
        .form-row label { font-size: 15px; color: var(--text-muted); font-weight: bold;}
        
        .form-row input[type="text"], .form-row input[type="number"], .full-input {
            background: var(--surface-light); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 0; padding: 10px;
            font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .form-row input[type="text"]:focus, .form-row input[type="number"]:focus, .full-input:focus { outline: 1px solid var(--text-muted); }
        .short-input { text-align: center; width: 80px; }
        .full-input { width: 100%; box-sizing: border-box; text-align: left; margin-bottom: 5px; }
        
        .btn-generate {
            background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 0; font-size: 16px; font-weight: bold;
            margin-top: 5px; cursor: pointer; border: 1px solid var(--border-color);
        }
        .btn-generate:active { background: var(--primary-active); }

        /* 文本系統專用導航與開關 */
        .sequence-nav { display: flex; justify-content: space-between; align-items: center; }
        .nav-btn {
            background: var(--surface-light); color: var(--text-main);
            border: 1px solid var(--border-color); padding: 8px 15px;
            font-weight: bold; cursor: pointer; transition: 0.2s; border-radius: 0;
        }
        .nav-btn:active { background: var(--surface-hover); }

        /* 方形開關 */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--surface-light); transition: .2s; border: 1px solid var(--border-color); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: .2s; }
        input:checked + .slider { background-color: var(--success); border-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); background-color: black; }

        #fontPreload { font-family: 'Bakudai-Regular'; visibility: hidden; position: absolute; }
    </style>
</head>
<body>

    <div id="fontPreload">字型預載</div>

    <div class="header">
        <div class="segmented-control">
            <div class="segment-btn active" onclick="switchTab('drawTab', this)">繪圖工作室</div>
            <div class="segment-btn" onclick="switchTab('textTab', this)">文字排版</div>
        </div>
    </div>

    <div id="drawTab" class="tab-content active">
        <div class="workspace-container">
            <div id="workspace">
                <canvas id="mainCanvas" width="100" height="100"></canvas>
                <canvas id="previewCanvas" width="100" height="100"></canvas>
                <canvas id="gridCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="bottom-panel">
            <div id="colorPalette" class="scroll-row"></div>
            
            <div class="scroll-row">
                <div id="pencil" class="tool active-tool" onclick="setTool('pencil')">畫筆</div>
                <div id="lineTool" class="tool" onclick="setTool('lineTool')">直線</div>
                <div id="paintBucket" class="tool" onclick="setTool('paintBucket')">填色</div>
                <div style="flex: 1;"></div>
                <div id="gridToggleBtn" class="tool tool-action" onclick="toggleGrid()">網格</div>
                <div class="tool tool-action" onclick="undo()">復原</div>
                <div class="tool tool-save" onclick="saveImage()">匯出</div>
            </div>
        </div>
    </div>

    <div id="textTab" class="tab-content">
        <div class="text-preview-wrapper">
            <div class="preview-container">
                <canvas id="textPreviewCanvas" width="100" height="100"></canvas>
            </div>
            <div class="hint-text">在畫面上單指滑動，調整文字位置</div>
        </div>

        <div class="form-group">
            <div>
                <label style="font-size: 15px; color: var(--text-muted); font-weight: bold; margin-bottom: 8px; display: block;">文本系統</label>
                <input type="text" id="sequenceInput" class="full-input" placeholder="請輸入一串連續文字" oninput="initSequence()">
            </div>
            
            <div class="sequence-nav">
                <button class="nav-btn" onclick="prevChar()">上一字</button>
                <span id="seqStatus" style="font-weight: bold; color: var(--text-main); font-size: 14px;">- / -</span>
                <button class="nav-btn" onclick="nextChar()">下一字</button>
            </div>

            <div class="form-row">
                <label>目前字元</label>
                <input type="text" id="textInput" class="short-input" maxlength="1" value="愛" oninput="manualCharChange()">
            </div>

            <div class="form-row">
                <label>標記完成</label>
                <label class="switch">
                    <input type="checkbox" id="doneSwitch" onchange="toggleDone()">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="form-row">
                <label>文字大小</label>
                <input type="number" id="fontSize" class="short-input" value="80" oninput="previewText()">
            </div>
            <button class="btn-generate" onclick="applyText()">套用並返回</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 100;
        const colorMapping = {
            '0,0,0': '1', '127,127,127': '2', '136,0,21': '3', '237,28,36': '4',
            '255,127,39': '5', '255,242,0': '6', '34,177,76': '7', '0,162,232': '8',
            '63,72,204': '9', '163,73,164': '10', '195,195,195': '11', '185,122,87': '12',
            '255,174,201': '13', '255,201,14': '14', '239,228,176': '15', '181,230,29': '16',
            '153,217,234': '17', '112,146,190': '18', '200,191,231': '19', '240,135,132': '20'
        };
        const colors = Object.keys(colorMapping);
        let currentColor = colors[0];
        let currentTool = 'pencil';
        
        let history = [];
        let textX = 50, textY = 10;
        let lockedMask = new Array(GRID_SIZE * GRID_SIZE).fill(true);

        // 文本系統狀態
        let seqData = [];
        let seqIndex = 0;

        const workspace = document.getElementById('workspace');
        const mainCanvas = document.getElementById('mainCanvas');
        const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
        const previewCanvas = document.getElementById('previewCanvas');
        const prevCtx = previewCanvas.getContext('2d');
        const gridCanvas = document.getElementById('gridCanvas');
        const gridCtx = gridCanvas.getContext('2d');

        const textPreviewCanvas = document.getElementById('textPreviewCanvas');
        const textPreviewCtx = textPreviewCanvas.getContext('2d', { willReadFrequently: true });

        let transform = { scale: 1, x: 0, y: 0 };
        
        let panZoomCooldown = false;
        let cooldownTimer = null;

        let gestureState = { 
            mode: null, 
            startX: 0, startY: 0,
            touchStartX: 0, touchStartY: 0,
            pinchStartDist: 0, 
            pinchStartCenter: {x: 0, y: 0},
            panStartOrigin: {x: 0, y: 0},
            scaleStart: 1
        };

        let lastTapTime = 0;
        let longPressTimer = null;
        let toolBeforeLongPress = null;

        let textDrag = { active: false, startX: 0, startY: 0, initialTextX: 50, initialTextY: 10 };

        function init() {
            mainCtx.fillStyle = '#FFFFFF';
            mainCtx.fillRect(0, 0, GRID_SIZE, GRID_SIZE);
            saveState();

            gridCtx.fillStyle = '#000000';
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if ((i + j) % 2 === 0) gridCtx.fillRect(i, j, 1, 1);
                }
            }

            const palette = document.getElementById('colorPalette');
            colors.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color';
                if (color === currentColor) btn.classList.add('selected');
                btn.style.backgroundColor = `rgb(${color})`;
                btn.innerText = colorMapping[color];
                btn.onclick = () => {
                    document.querySelectorAll('.color').forEach(c => c.classList.remove('selected'));
                    btn.classList.add('selected');
                    currentColor = color;
                };
                palette.appendChild(btn);
            });

            workspace.addEventListener('touchstart', handleTouchStart, { passive: false });
            workspace.addEventListener('touchmove', handleTouchMove, { passive: false });
            workspace.addEventListener('touchend', handleTouchEnd, { passive: false });

            textPreviewCanvas.addEventListener('touchstart', handleTextTouchStart, { passive: false });
            textPreviewCanvas.addEventListener('touchmove', handleTextTouchMove, { passive: false });
            textPreviewCanvas.addEventListener('touchend', handleTextTouchEnd, { passive: false });
        }

        /* --- 文本系統邏輯 --- */
        function initSequence() {
            const str = document.getElementById('sequenceInput').value;
            if (!str) {
                seqData = []; updateSeqUI(); return;
            }
            const newSeq = Array.from(str).map(char => {
                const existing = seqData.find(item => item.char === char);
                return { char: char, done: existing ? existing.done : false };
            });
            seqData = newSeq;
            if (seqIndex >= seqData.length) seqIndex = Math.max(0, seqData.length - 1);
            updateSeqUI();
        }

        function updateSeqUI() {
            if (seqData.length === 0) {
                document.getElementById('seqStatus').innerText = '- / -';
                return;
            }
            const current = seqData[seqIndex];
            document.getElementById('seqStatus').innerText = `${seqIndex + 1} / ${seqData.length}`;
            document.getElementById('textInput').value = current.char;
            document.getElementById('doneSwitch').checked = current.done;

            // 若標記完成，將顯示框變成淺灰色
            const txtInput = document.getElementById('textInput');
            if (current.done) {
                txtInput.style.backgroundColor = '#CCCCCC';
                txtInput.style.color = '#000000';
            } else {
                txtInput.style.backgroundColor = 'var(--surface-light)';
                txtInput.style.color = 'var(--text-main)';
            }
            previewText();
        }

        function nextChar() {
            if (seqIndex < seqData.length - 1) { seqIndex++; updateSeqUI(); }
        }
        function prevChar() {
            if (seqIndex > 0) { seqIndex--; updateSeqUI(); }
        }
        function toggleDone() {
            if (seqData.length > 0) {
                seqData[seqIndex].done = document.getElementById('doneSwitch').checked;
                updateSeqUI();
            }
        }
        function manualCharChange() {
            if (seqData.length > 0) {
                seqData[seqIndex].char = document.getElementById('textInput').value;
            }
            previewText();
        }

        /* --- 系統切換 --- */
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.segment-btn').forEach(el => el.classList.remove('active'));
            if(tabId === 'textTab') { previewText(); }
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function setTool(toolName) {
            currentTool = toolName;
            document.querySelectorAll('#pencil, #lineTool, #paintBucket').forEach(t => t.classList.remove('active-tool'));
            document.getElementById(toolName).classList.add('active-tool');
        }

        function toggleGrid() {
            const btn = document.getElementById('gridToggleBtn');
            if (gridCanvas.style.opacity === '0' || gridCanvas.style.opacity === 0) {
                gridCanvas.style.opacity = '0.15'; btn.classList.remove('disabled-look');
            } else {
                gridCanvas.style.opacity = '0'; btn.classList.add('disabled-look');
            }
        }

        function getCanvasPos(clientX, clientY) {
            const rect = workspace.getBoundingClientRect();
            const x = Math.floor(((clientX - rect.left) / rect.width) * GRID_SIZE);
            const y = Math.floor(((clientY - rect.top) / rect.height) * GRID_SIZE);
            return { x, y };
        }

        function canDraw(x, y) {
            if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return false;
            return !lockedMask[y * GRID_SIZE + x];
        }

        /* --- 手勢互動邏輯 --- */
        function handleTouchStart(e) {
            e.preventDefault(); 
            
            if (e.touches.length === 1) {
                if (panZoomCooldown) return;

                const now = Date.now();
                const pos = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);

                // 判斷雙擊 (Double Tap)
                if (now - lastTapTime < 300) {
                    clearTimeout(longPressTimer);
                    
                    const imgData = mainCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
                    const targetColor = getPixelColor(imgData.data, pos.x, pos.y);
                    const isWhite = targetColor.r >= 200 && targetColor.g >= 200 && targetColor.b >= 200;

                    if (isWhite) {
                        undo(); // 連點白色觸發復原
                    } else {
                        saveState(); // 連點顏色區域保留油漆桶功能
                        floodFill(pos.x, pos.y, currentColor);
                    }

                    lastTapTime = 0; 
                    gestureState.mode = 'ignore'; 
                    return;
                }
                lastTapTime = now;

                gestureState.mode = 'draw';
                gestureState.startX = pos.x; 
                gestureState.startY = pos.y;
                gestureState.touchStartX = e.touches[0].clientX;
                gestureState.touchStartY = e.touches[0].clientY;
                toolBeforeLongPress = currentTool;
                
                if (currentTool === 'pencil') {
                    saveState(); drawPixel(mainCtx, pos.x, pos.y, currentColor);
                } else if (currentTool === 'paintBucket') {
                    saveState(); floodFill(pos.x, pos.y, currentColor);
                }

                longPressTimer = setTimeout(() => {
                    if (gestureState.mode === 'draw') {
                        if (toolBeforeLongPress === 'pencil') undo();
                        setTool('lineTool');
                        if (navigator.vibrate) navigator.vibrate(40);
                        prevCtx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
                    }
                }, 400);

            // 雙指分離偵測模式 (防同時移動縮放)
            } else if (e.touches.length === 2) {
                clearTimeout(longPressTimer);
                gestureState.mode = 'panzoom-detect'; 
                
                const t1 = e.touches[0]; const t2 = e.touches[1];
                const cx = (t1.clientX + t2.clientX) / 2;
                const cy = (t1.clientY + t2.clientY) / 2;
                const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);

                gestureState.pinchStartCenter = { x: cx, y: cy };
                gestureState.pinchStartDist = dist;
                gestureState.panStartOrigin = { x: transform.x, y: transform.y };
                gestureState.scaleStart = transform.scale;
                
                prevCtx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            
            if (e.touches.length === 1 && gestureState.mode === 'draw') {
                if (panZoomCooldown) return;

                const dxMove = Math.abs(e.touches[0].clientX - gestureState.touchStartX);
                const dyMove = Math.abs(e.touches[0].clientY - gestureState.touchStartY);
                if (dxMove > 5 || dyMove > 5) clearTimeout(longPressTimer);

                const pos = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
                if (currentTool === 'pencil') {
                    drawLine(mainCtx, gestureState.startX, gestureState.startY, pos.x, pos.y, currentColor);
                    gestureState.startX = pos.x; gestureState.startY = pos.y;
                } else if (currentTool === 'lineTool') {
                    prevCtx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
                    drawLine(prevCtx, gestureState.startX, gestureState.startY, pos.x, pos.y, currentColor);
                }

            // 判斷並鎖定純移動或純縮放
            } else if (e.touches.length === 2) {
                const t1 = e.touches[0]; const t2 = e.touches[1];
                const cx = (t1.clientX + t2.clientX) / 2;
                const cy = (t1.clientY + t2.clientY) / 2;
                const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);

                if (gestureState.mode === 'panzoom-detect') {
                    const distChange = Math.abs(dist - gestureState.pinchStartDist);
                    const panChange = Math.hypot(cx - gestureState.pinchStartCenter.x, cy - gestureState.pinchStartCenter.y);
                    if (distChange > 15) gestureState.mode = 'zoom';
                    else if (panChange > 15) gestureState.mode = 'pan';
                }

                if (gestureState.mode === 'zoom') {
                    let newScale = gestureState.scaleStart * (dist / gestureState.pinchStartDist);
                    transform.scale = Math.max(0.5, Math.min(newScale, 10)); 
                    applyTransform();
                } else if (gestureState.mode === 'pan') {
                    const dxPan = cx - gestureState.pinchStartCenter.x;
                    const dyPan = cy - gestureState.pinchStartCenter.y;
                    transform.x = gestureState.panStartOrigin.x + dxPan;
                    transform.y = gestureState.panStartOrigin.y + dyPan;
                    applyTransform();
                }
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            clearTimeout(longPressTimer);

            // 防誤觸冷卻鎖定 (0.5秒)
            if ((gestureState.mode === 'zoom' || gestureState.mode === 'pan' || gestureState.mode === 'panzoom-detect') && e.touches.length < 2) {
                panZoomCooldown = true;
                clearTimeout(cooldownTimer);
                cooldownTimer = setTimeout(() => { panZoomCooldown = false; }, 500);
                if (e.touches.length > 0) gestureState.mode = 'ignore'; 
            }

            if (gestureState.mode === 'draw' && currentTool === 'lineTool' && e.changedTouches.length > 0) {
                if (!panZoomCooldown) {
                    saveState();
                    const pos = getCanvasPos(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    prevCtx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
                    drawLine(mainCtx, gestureState.startX, gestureState.startY, pos.x, pos.y, currentColor);
                }
            }

            if (e.touches.length === 0) {
                if (gestureState.mode !== 'ignore' || panZoomCooldown === false) gestureState.mode = null;
            }
        }

        function applyTransform() {
            workspace.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
        }

        function drawPixel(ctx, x, y, colorStr) {
            if (ctx === mainCtx && !canDraw(x, y)) return; 
            ctx.fillStyle = `rgb(${colorStr})`; ctx.fillRect(x, y, 1, 1);
        }

        function drawLine(ctx, x0, y0, x1, y1, colorStr) {
            ctx.fillStyle = `rgb(${colorStr})`;
            let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
            let dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
            let err = dx + dy, e2;
            while (true) {
                if (ctx !== mainCtx || canDraw(x0, y0)) ctx.fillRect(x0, y0, 1, 1);
                if (x0 === x1 && y0 === y1) break;
                e2 = 2 * err;
                if (e2 >= dy) { err += dy; x0 += sx; }
                if (e2 <= dx) { err += dx; y0 += sy; }
            }
        }

        function floodFill(startX, startY, fillRGBStr) {
            if (!canDraw(startX, startY)) return; 

            const imgData = mainCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
            const data = imgData.data;
            const targetColor = getPixelColor(data, startX, startY);
            const [fr, fg, fb] = fillRGBStr.split(',').map(Number);
            if (targetColor.r === fr && targetColor.g === fg && targetColor.b === fb) return;

            const stack = [[startX, startY]];
            while (stack.length > 0) {
                const [x, y] = stack.pop();
                const pos = (y * GRID_SIZE + x) * 4;
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) continue;
                if (data[pos] !== targetColor.r || data[pos+1] !== targetColor.g || data[pos+2] !== targetColor.b) continue;

                data[pos] = fr; data[pos+1] = fg; data[pos+2] = fb; data[pos+3] = 255;
                stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
            }
            mainCtx.putImageData(imgData, 0, 0);
        }

        function getPixelColor(data, x, y) {
            const pos = (y * GRID_SIZE + x) * 4;
            return { r: data[pos], g: data[pos+1], b: data[pos+2] };
        }

        function saveState() {
            history.push(mainCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE));
            if (history.length > 20) history.shift();
        }
        function undo() {
            if (history.length > 0) {
                const lastState = history.pop();
                mainCtx.putImageData(lastState, 0, 0);
            }
        }
        
        /* --- 文字排版：高阻力滑動位移 --- */
        function handleTextTouchStart(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                textDrag.active = true;
                textDrag.startX = e.touches[0].clientX;
                textDrag.startY = e.touches[0].clientY;
                textDrag.initialTextX = textX;
                textDrag.initialTextY = textY;
            }
        }

        function handleTextTouchMove(e) {
            e.preventDefault();
            if (textDrag.active && e.touches.length === 1) {
                const dx = e.touches[0].clientX - textDrag.startX;
                const dy = e.touches[0].clientY - textDrag.startY;

                const rect = textPreviewCanvas.getBoundingClientRect();
                const scaleX = rect.width / GRID_SIZE;
                const scaleY = rect.height / GRID_SIZE;

                // 阻力係數：數值越大，需要的物理滑動距離越長
                const dragResistance = 4;

                const logicalDx = Math.round(dx / (scaleX * dragResistance));
                const logicalDy = Math.round(dy / (scaleY * dragResistance));

                if (logicalDx !== 0 || logicalDy !== 0) {
                    textX = textDrag.initialTextX + logicalDx;
                    textY = textDrag.initialTextY + logicalDy;
                    previewText();
                }
            }
        }

        function handleTextTouchEnd(e) {
            e.preventDefault();
            textDrag.active = false;
        }

        function previewText() {
            const text = document.getElementById('textInput').value;
            const size = document.getElementById('fontSize').value;
            
            textPreviewCtx.fillStyle = '#FFFFFF';
            textPreviewCtx.fillRect(0, 0, GRID_SIZE, GRID_SIZE);
            textPreviewCtx.font = `${size}px 'Bakudai-Regular', sans-serif`;
            textPreviewCtx.fillStyle = '#000000';
            textPreviewCtx.textAlign = 'center';
            textPreviewCtx.textBaseline = 'top';
            textPreviewCtx.fillText(text, textX, textY);

            const imgData = textPreviewCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
            for(let i=0; i<imgData.data.length; i+=4) {
                const r = imgData.data[i];
                const alpha = imgData.data[i+3];
                const isWhite = (alpha < 128) || (r >= 200); 

                if (isWhite) {
                    imgData.data[i] = 255; imgData.data[i+1] = 255; imgData.data[i+2] = 255; imgData.data[i+3] = 255;
                } else {
                    imgData.data[i] = 0; imgData.data[i+1] = 0; imgData.data[i+2] = 0; imgData.data[i+3] = 255;
                }
            }
            textPreviewCtx.putImageData(imgData, 0, 0);

            textPreviewCtx.fillStyle = 'rgba(0,0,0,0.1)';
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if ((i + j) % 2 === 0) textPreviewCtx.fillRect(i, j, 1, 1);
                }
            }
        }

        function applyText() {
            saveState();
            const text = document.getElementById('textInput').value;
            const size = document.getElementById('fontSize').value;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = GRID_SIZE; tempCanvas.height = GRID_SIZE;
            const tCtx = tempCanvas.getContext('2d');
            
            tCtx.fillStyle = 'white'; tCtx.fillRect(0, 0, GRID_SIZE, GRID_SIZE);
            tCtx.font = `${size}px 'Bakudai-Regular', sans-serif`;
            tCtx.fillStyle = 'black';
            tCtx.textAlign = 'center'; tCtx.textBaseline = 'top';
            tCtx.fillText(text, textX, textY);

            const imgData = tCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
            for(let i=0; i<imgData.data.length; i+=4) {
                const r = imgData.data[i];
                const alpha = imgData.data[i+3];
                const isWhite = (alpha < 128) || (r >= 200); 

                lockedMask[i/4] = isWhite; 
                if (isWhite) {
                    imgData.data[i] = 255; imgData.data[i+1] = 255; imgData.data[i+2] = 255; imgData.data[i+3] = 255;
                } else {
                    imgData.data[i] = 0; imgData.data[i+1] = 0; imgData.data[i+2] = 0; imgData.data[i+3] = 255;
                }
            }
            mainCtx.putImageData(imgData, 0, 0);
            
            // 套用後若是系統有字，自動標記完成並切換到下一字
            if (seqData.length > 0) {
                document.getElementById('doneSwitch').checked = true;
                toggleDone();
                nextChar();
            }
            
            switchTab('drawTab', document.querySelectorAll('.segment-btn')[0]);
        }

        function saveImage() {
            const link = document.createElement('a');
            // 檔名使用文字本身
            const fileName = document.getElementById('textInput').value || 'pixel';
            link.download = `${fileName}.png`;
            link.href = mainCanvas.toDataURL('image/png');
            link.click();
        }

        window.onload = () => {
            init();
            document.fonts.ready.then(() => previewText());
        };
    </script>
</body>
</html>
